# Multilingual SIREN experiment config.
# Updated to match the currently documented Hugging Face dataset IDs/configs/splits/schemas.
# Before the expensive representation/probe/MLP run, scripts/run_multilingual_siren.sh
# now runs scripts/validate_dataset_schemas.py and fails early if an enabled dataset
# cannot be loaded or normalized.

seed: 42
output_root: outputs/multilingual_siren
cache_dir: null
max_length: 512
val_ratio_if_no_validation: 0.2
test_ratio_if_no_test: 0.1
balance_per_dataset: true
max_samples_per_dataset_split: null   # set e.g. 5000 for debugging
languages: [en, ko, fr]
shared_min_langs: 3                  # 3 = strict intersection across en/ko/fr; 2 = majority-shared
route_unknown_lang_to: en
label_positive_is_unsafe: true

probe:
  c_values: [100.0, 1000.0]
  metric: f1_macro
  quick_eval: true
  # eps_weight_ratio: pre-filter near-zero probe weights before cumulative selection.
  # 0.0 = disabled (default).  Set to 1e-3 if selection ratios are consistently >50%
  # (symptom: soft-L1/Adam probe does not drive weights to exact zero, causing diffuse
  # importance distribution).  Check quick_selection_debug.csv → selected_ratio column.
  eps_weight_ratio: 0.0

mlp:
  n_trials: 32
  n_folds: 3
  batch_size: 8192
  epochs_final: 512
  early_stopping_patience: 10
  weight_decay: 0.0001
  hidden_layers_min: 2
  hidden_layers_max: 3
  hidden_dim_min: 64
  hidden_dim_max: 2048
  dropout_min: 0.2
  dropout_max: 0.5
  lr_min: 0.0001
  lr_max: 0.005

# Notes:
# - WildGuardMix is gated on HF. Accept the AI2 Responsible Use Guidelines first.
# - ToxicChat has multiple HF configs; use the latest documented toxicchat0124 config.
# - Lumees has train/test only; validation is created from train by the loader.
# - iknow-lab/wildguardmix-test-ko has test only; train/validation are created from that split.
# - LinguaSafe currently contains en/ko but not fr according to the paper language table,
#   so it is useful as an auxiliary multilingual safety dataset, not as the sole en/ko/fr source.
datasets:
  # -----------------------------
  # English / SIREN-style safety sources
  # -----------------------------
  - name: wildguardmix_train_en
    enabled: true
    source: hf
    hf_id: allenai/wildguardmix
    hf_name: wildguardtrain
    split_map: {train: train, validation: null, test: null}
    lang: en
    text_template: "{prompt}\n\n{response}"
    text_candidates: [prompt, text, user_prompt, instruction]
    response_candidates: [response, assistant_response, completion]
    label_candidates: [response_harm_label, prompt_harm_label, label, is_harmful, harmful, unsafe]
    unsafe_values: [harmful, unsafe, Harmful, Unsafe, true, True, 1, "1", yes]
    safe_values: [unharmful, safe, benign, Harmless, Safe, false, False, 0, "0", no]
    category_candidates: [subcategory, risk_category, harm_category, category]

  - name: wildguardmix_test_en
    enabled: true
    source: hf
    hf_id: allenai/wildguardmix
    hf_name: wildguardtest
    split_map: {train: null, validation: null, test: test}
    lang: en
    text_template: "{prompt}\n\n{response}"
    text_candidates: [prompt, text, user_prompt, instruction]
    response_candidates: [response, assistant_response, completion]
    label_candidates: [response_harm_label, prompt_harm_label, label, is_harmful, harmful, unsafe]
    unsafe_values: [harmful, unsafe, Harmful, Unsafe, true, True, 1, "1", yes]
    safe_values: [unharmful, safe, benign, Harmless, Safe, false, False, 0, "0", no]
    category_candidates: [subcategory, risk_category, harm_category, category]

  - name: toxicchat_en
    enabled: true
    source: hf
    hf_id: lmsys/toxic-chat
    hf_name: toxicchat0124
    split_map: {train: train, validation: null, test: test}
    lang: en
    text_candidates: [user_input, prompt, text]
    response_candidates: [model_output, response, answer, output]
    label_candidates: [toxicity, toxic, label]
    unsafe_values: [1, "1", true, True, toxic, unsafe, harmful]
    safe_values: [0, "0", false, False, non-toxic, safe, benign]
    category_candidates: [jailbreaking]

  - name: aegis2_en
    enabled: true
    source: hf
    hf_id: nvidia/Aegis-AI-Content-Safety-Dataset-2.0
    split_map: {train: train, validation: validation, test: test}
    lang: en
    text_template: "{prompt}\n\n{response}"
    text_candidates: [prompt, text, user_prompt, instruction]
    response_candidates: [response, assistant_response, completion]
    label_candidates: [response_label, prompt_label, label, safety_label, moderation_label]
    unsafe_values: [unsafe, Unsafe, harmful, Harmful, 1, "1", true, True]
    safe_values: [safe, Safe, benign, harmless, 0, "0", false, False]
    category_candidates: [violated_categories, categories, category, risk_type]

  - name: beavertails_en
    enabled: true
    source: hf
    hf_id: PKU-Alignment/BeaverTails
    split_map: {train: 330k_train, validation: null, test: 30k_test}
    lang: en
    text_template: "{prompt}\n\n{response}"
    text_candidates: [prompt, text, question]
    response_candidates: [response, answer, output]
    label_candidates: [is_safe, safe, label]
    # is_safe=True means safe, so reverse mapping is handled here.
    unsafe_values: [false, False, 0, "0", unsafe, harmful]
    safe_values: [true, True, 1, "1", safe, harmless]
    category_candidates: [category, safety_category]

  - name: pku_saferlhf_en
    enabled: true
    source: hf
    hf_id: PKU-Alignment/PKU-SafeRLHF
    # default config is used. Other available configs include alpaca-7b/alpaca2-7b/alpaca3-8b.
    split_map: {train: train, validation: null, test: test}
    lang: en
    paired_response_mode: true
    text_candidates: [prompt, text, question]
    response0_candidates: [response_0, answer_0]
    response1_candidates: [response_1, answer_1]
    label0_candidates: [is_response_0_safe, response_0_safe]
    label1_candidates: [is_response_1_safe, response_1_safe]
    response0_category_candidates: [response_0_harm_category, response_0_severity_level]
    response1_category_candidates: [response_1_harm_category, response_1_severity_level]
    unsafe_values: [false, False, 0, "0", unsafe, harmful]
    safe_values: [true, True, 1, "1", safe, harmless]
    category_candidates: [category, safety_category]

  # -----------------------------
  # Multilingual safety sources
  # -----------------------------
  - name: linguasafe_multi
    enabled: true
    source: hf
    hf_id: zhiyuan-ning/linguasafe
    # LinguaSafe's official evaluator loads split="train" only. Its binary label is
    # derived from severity level: level=0 is safe/oversensitivity probe, level>0 is unsafe.
    # The dataset covers English and Korean, but not French, so it is an auxiliary en/ko source.
    split_map: {train: train, validation: null, test: null}
    lang_candidates: [lang, language, locale]
    keep_langs: [en, ko, fr]
    text_candidates: [prompt, query, instruction, text, input]
    label_candidates: [level, severity, risk_level, label, safety_label, is_safe, unsafe]
    unsafe_values: [1, "1", 2, "2", 3, "3", unsafe, harmful, high, medium, severe, true, True]
    safe_values: [0, "0", safe, harmless, benign, none, low, false, False]
    category_candidates: [subtype, domain, category, risk_category, safety_domain]

  - name: lumees_multi
    enabled: true
    source: hf
    hf_id: lumees/multilingual-safety-classification-dataset
    # HF currently exposes only a train split; train is split locally into train/validation/test.
    split_map: {train: train, validation: null, test: null}
    lang_candidates: [lang, language, locale]
    keep_langs: [en, ko, fr]
    text_candidates: [prompt, query, instruction, text, input]
    label_candidates: [safety_label, label, unsafe, is_unsafe, is_safe]
    # Lumees: safety_label 0=safe, 1=needs review, 2=unsafe.
    # For binary safety-neuron selection, 1 and 2 are treated as unsafe/non-safe.
    unsafe_values: [1, "1", 2, "2", unsafe, harmful, needs_review, review, true, True]
    safe_values: [0, "0", safe, harmless, benign, false, False]
    category_candidates: [category, risk_category, type]

  - name: wildguardmix_ko_test
    enabled: true
    source: hf
    hf_id: iknow-lab/wildguardmix-test-ko
    split_map: {train: null, validation: null, test: test}
    lang: ko
    text_template: "{prompt}\n\n{response}"
    text_candidates: [prompt, ko_prompt, text, user_prompt]
    response_candidates: [response, ko_response, assistant_response]
    label_candidates: [response_harm_label, prompt_harm_label, label, is_harmful, harmful, unsafe]
    unsafe_values: [harmful, unsafe, Harmful, Unsafe, true, True, 1, "1"]
    safe_values: [unharmful, safe, benign, Harmless, Safe, false, False, 0, "0"]
    category_candidates: [subcategory, risk_category, harm_category, category]

  # XSafety is often distributed through GitHub rather than HF. Convert it to local JSONL/CSV
  # with columns: text,label,lang,category and set enabled=true.
  - name: xsafety_local
    enabled: false
    source: local
    path: data/xsafety_en_ko_fr.jsonl
    split_map: {train: train, validation: validation, test: test}
    lang_candidates: [lang, language]
    keep_langs: [en, ko, fr]
    text_candidates: [text, prompt, query]
    label_candidates: [label, unsafe, is_unsafe]
    unsafe_values: [unsafe, harmful, 1, "1", true, True]
    safe_values: [safe, harmless, 0, "0", false, False]
    category_candidates: [category, task, risk_category]

  # M-ALERT mainly helps en/fr. Use after converting to local JSONL/CSV if needed.
  - name: malert_local
    enabled: false
    source: local
    path: data/malert_en_fr.jsonl
    split_map: {train: train, validation: validation, test: test}
    lang_candidates: [lang, language]
    keep_langs: [en, fr]
    text_candidates: [text, prompt, query]
    label_candidates: [label, unsafe, is_unsafe]
    unsafe_values: [unsafe, harmful, 1, "1", true, True]
    safe_values: [safe, harmless, 0, "0", false, False]
    category_candidates: [category, risk_category]
